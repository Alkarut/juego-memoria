<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CLEANMANT MOBILE - Hardware Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #050a0c;
    color: white;
    text-align: center;
    font-family: 'Press Start 2P', cursive;
    overflow: hidden;
    touch-action: none;
}
canvas {
    display: none;
    background: #111;
    border: 4px solid #00ffff;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    margin: 10px auto;
    max-width: 95vw;
    max-height: 80vh;
}
#menu { margin-top: 80px; padding: 20px; }
button {
    padding: 20px 40px;
    font-family: 'Press Start 2P', cursive;
    background: cyan;
    border: none;
    box-shadow: 0 5px 0 #008b8b;
    cursor: pointer;
    margin-top: 20px;
}
.hud {
    color: cyan;
    font-size: 10px;
    margin: 10px;
    display: none;
    justify-content: space-around;
}
.shock { animation: shake 0.1s infinite; }
@keyframes shake {
    0% { transform: translate(3px, 3px); }
    50% { transform: translate(-3px, -3px); }
    100% { transform: translate(0, 0); }
}
</style>
</head>
<body>

<div id="menu">
    <h1>🧽 CLEANMANT</h1>
    <p style="font-size: 10px; line-height: 1.6;">
        Limpia el Hardware.<br>
        ¡Dificultad Progresiva!<br>
        Láser: Mantén presionado.
    </p>
    <button onclick="startGame()">INICIAR LIMPIEZA</button>
</div>

<div id="hud" class="hud">
    <span>LVL: <span id="lvl">1</span></span>
    <span>LIMPIEZA: <span id="pct">0%</span></span>
    <span>VIDAS: <span id="vds">❤️❤️❤️</span></span>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let level = 1;
let lives = 3;
let discount = 0;
let gameRunning = false;
let isFiring = false;
let shockTimer = 0;
let totalDustInLevel = 0;

let sponge = { x: 175, y: 500, size: 50 };
let dust = [];
let viruses = [];
let bubbles = [];

function drawTower() {
    let g = ctx.createLinearGradient(100, 50, 300, 50);
    g.addColorStop(0, "#222"); g.addColorStop(0.5, "#444"); g.addColorStop(1, "#222");
    ctx.fillStyle = g;
    ctx.fillRect(100, 50, 200, 450);
}

function drawMonitor() {
    ctx.fillStyle = "#333";
    ctx.fillRect(50, 100, 300, 220);
}

function drawMouse() {
    ctx.fillStyle = "#444";
    ctx.beginPath();
    ctx.ellipse(200, 320, 70, 100, 0, 0, Math.PI*2);
    ctx.fill();
}

function moveSponge(e) {
    e.preventDefault();
    let clientX, clientY;
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    let rect = canvas.getBoundingClientRect();
    sponge.x = clientX - rect.left - 25;
    sponge.y = clientY - rect.top - 25;
}

canvas.addEventListener("mousemove", moveSponge);
canvas.addEventListener("touchmove", moveSponge, {passive:false});
canvas.addEventListener("mousedown", () => isFiring = true);
canvas.addEventListener("mouseup", () => isFiring = false);
canvas.addEventListener("touchstart", () => isFiring = true);
canvas.addEventListener("touchend", () => isFiring = false);

function createLevel() {
    dust = [];
    totalDustInLevel = 30 + (level * 15);
    for(let i=0; i < totalDustInLevel; i++) {
        dust.push({
            x: 50 + Math.random()*300,
            y: 100 + Math.random()*350,
            r: 6
        });
    }
}

function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("hud").style.display = "flex";
    canvas.style.display = "block";
    level = 1;
    lives = 3;
    discount = 0;
    document.getElementById("lvl").innerText = level;
    document.getElementById("vds").innerText = "❤️❤️❤️";
    createLevel();
    gameRunning = true;
    update();
}

function endGame(msg, color) {
    gameRunning = false;
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0,0,400,600);

    ctx.fillStyle = color;
    ctx.font = "18px 'Press Start 2P'";
    ctx.textAlign = "center";
    ctx.fillText(msg, 200, 260);

    ctx.fillStyle = "white";
    ctx.font = "12px 'Press Start 2P'";
    ctx.fillText("DESCUENTO FINAL " + discount + "%", 200, 320);

    setTimeout(() => location.reload(), 5000);
}

function update() {
    if(!gameRunning) return;
    ctx.clearRect(0,0,400,600);

    if(level === 1) drawTower();
    else if(level === 2) drawMonitor();
    else drawMouse();

    ctx.fillStyle = "#5c4033";
    dust.forEach(d => {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
        ctx.fill();
    });

    dust = dust.filter(d =>
        Math.hypot((sponge.x+25)-d.x,(sponge.y+17)-d.y) > 38
    );

    let progress = Math.floor(((totalDustInLevel - dust.length)/totalDustInLevel)*100);
    document.getElementById("pct").innerText = progress + "%";

    ctx.fillStyle = "#ffd700";
    ctx.fillRect(sponge.x, sponge.y, 50, 35);

    if(dust.length === 0) {

        if(level === 1) discount = 10;
        else if(level === 2) discount = 20;
        else if(level === 3) discount = 40;

        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0,0,400,600);

        ctx.fillStyle = "cyan";
        ctx.font = "14px 'Press Start 2P'";
        ctx.fillText("¡NIVEL SUPERADO!", 200, 250);

        ctx.fillStyle = "white";
        ctx.fillText("GANASTE " + discount + "% OFF", 200, 300);

        setTimeout(() => {
            level++;
            if(level > 3) {
                endGame("LIMPIEZA 100%", "cyan");
            } else {
                document.getElementById("lvl").innerText = level;
                createLevel();
                update();
            }
        }, 2500);

        return;
    }

    requestAnimationFrame(update);
}
</script>
</body>
</html>
