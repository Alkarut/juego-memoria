<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLEANMANT MOBILE - Hardware Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #050a0c;
            color: white;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            touch-action: none; /* Evita zoom accidental */
        }
        canvas {
            display: none;
            background: #111;
            border: 4px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            margin: 10px auto;
            max-width: 95vw;
            max-height: 80vh;
        }
        #menu { 
            margin-top: 80px; 
            padding: 20px; 
            display: block; /* Asegura que se vea al inicio */
        }
        button {
            padding: 25px 40px;
            font-family: 'Press Start 2P', cursive;
            background: #00ffff;
            color: #000;
            border: none;
            box-shadow: 0 5px 0 #008b8b;
            cursor: pointer;
            margin-top: 20px;
            font-size: 14px;
            border-radius: 5px;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #008b8b;
        }
        .hud {
            color: cyan;
            font-size: 10px;
            margin: 10px;
            display: none;
            justify-content: space-around;
        }
        .shock { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(3px, 3px); }
            50% { transform: translate(-3px, -3px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>🧽 CLEANMANT</h1>
    <p style="font-size: 10px; line-height: 1.6;">Limpia el Hardware.<br>¡Dificultad Progresiva!<br>Láser: Mantén presionado.</p>
    <button id="btnStart">INICIAR LIMPIEZA</button>
</div>

<div id="hud" class="hud">
    <span>LVL: <span id="lvl">1</span></span>
    <span>LIMPIEZA: <span id="pct">0%</span></span>
    <span>VIDAS: <span id="vds">❤️❤️❤️</span></span>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");
const hud = document.getElementById("hud");
const btnStart = document.getElementById("btnStart");

let level = 1;
let lives = 3;
let gameRunning = false;
let isFiring = false;
let shockTimer = 0;
let totalDustInLevel = 0;

let sponge = { x: 175, y: 500, size: 50 };
let dust = [];
let viruses = [];
let bubbles = [];

// --- DIBUJO DE HARDWARE ---
function drawTower() {
    let g = ctx.createLinearGradient(100, 50, 300, 50);
    g.addColorStop(0, "#222"); g.addColorStop(0.5, "#444"); g.addColorStop(1, "#222");
    ctx.fillStyle = g;
    ctx.fillRect(100, 50, 200, 450);
    ctx.fillStyle = "#111";
    ctx.fillRect(110, 80, 180, 40);
    ctx.strokeStyle = "#333";
    ctx.strokeRect(110, 80, 180, 40);
}

function drawMonitor() {
    ctx.fillStyle = "#333";
    ctx.beginPath(); ctx.roundRect(50, 100, 300, 220, 15); ctx.fill();
    ctx.fillStyle = "#001";
    ctx.fillRect(70, 120, 260, 160);
}

function drawMouse() {
    ctx.fillStyle = "#222";
    ctx.beginPath(); ctx.ellipse(200, 320, 70, 100, 0, 0, Math.PI*2); ctx.fill();
}

// --- LÓGICA DE MOVIMIENTO ---
function moveSponge(e) {
    if(!gameRunning) return;
    e.preventDefault();
    let clientX, clientY;
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX; clientY = e.clientY;
    }
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width;
    let scaleY = canvas.height / rect.height;
    sponge.x = (clientX - rect.left) * scaleX - 25;
    sponge.y = (clientY - rect.top) * scaleY - (e.touches ? 100 : 25);
}

canvas.addEventListener("mousemove", moveSponge);
canvas.addEventListener("touchmove", moveSponge, {passive: false});
canvas.addEventListener("mousedown", () => isFiring = true);
canvas.addEventListener("mouseup", () => isFiring = false);
canvas.addEventListener("touchstart", (e) => { isFiring = true; moveSponge(e); }, {passive: false});
canvas.addEventListener("touchend", () => isFiring = false);

function takeDamage() {
    lives--;
    shockTimer = 40;
    canvas.classList.add("shock");
    document.getElementById("vds").innerText = "❤️".repeat(lives);
    if(lives <= 0) endGame("GAME OVER", "red");
}

function endGame(msg, color) {
    gameRunning = false;
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0,0,400,600);
    ctx.fillStyle = color;
    ctx.font = "20px 'Press Start 2P'";
    ctx.textAlign = "center";
    ctx.fillText(msg, 200, 300);
    
    // Descuentos finales
    ctx.fillStyle = "white";
    ctx.font = "12px 'Press Start 2P'";
    if(msg === "LIMPIEZA 100%") {
        ctx.fillText("¡HARDWARE IMPECABLE!", 200, 340);
        ctx.fillStyle = "yellow";
        ctx.fillText("BONO: 40% DESCUENTO", 200, 380);
    }

    setTimeout(() => location.reload(), 4000);
}

function createLevel() {
    dust = []; bubbles = [];
    totalDustInLevel = 30 + (level * 15);
    for(let i=0; i < totalDustInLevel; i++) {
        dust.push({ x: 50 + Math.random()*300, y: 100 + Math.random()*350, r: 6 });
    }
    viruses = [];
    for(let i=0; i < level + 1; i++) {
        let speed = 2.5 + level;
        viruses.push({
            x: Math.random()*350, y: Math.random()*200,
            vx: (Math.random()-0.5) * speed, vy: (Math.random()-0.5) * speed, r: 13
        });
    }
}

// FUNCIÓN DE INICIO REFORZADA
function startGame() {
    console.log("Iniciando...");
    menu.style.display = "none";
    hud.style.display = "flex";
    canvas.style.display = "block";
    
    level = 1; 
    lives = 3;
    gameRunning = true;
    
    document.getElementById("lvl").innerText = level;
    document.getElementById("vds").innerText = "❤️❤️❤️";
    
    createLevel();
    requestAnimationFrame(update);
}

// Evento de clic y touch para el botón
btnStart.addEventListener("click", startGame);
btnStart.addEventListener("touchstart", (e) => {
    e.preventDefault();
    startGame();
}, {once: true});

function update() {
    if(!gameRunning) return;
    ctx.clearRect(0, 0, 400, 600);

    if(level === 1) drawTower();
    else if(level === 2) drawMonitor();
    else drawMouse();

    ctx.fillStyle = "#5c4033";
    dust.forEach(d => {
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
    });

    viruses.forEach(v => {
        v.x += v.vx; v.y += v.vy;
        if(v.x < 10 || v.x > 390) v.vx *= -1;
        if(v.y < 10 || v.y > 590) v.vy *= -1;
        
        ctx.fillStyle = "red";
        ctx.beginPath(); ctx.arc(v.x, v.y, v.r, 0, Math.PI*2); ctx.fill();
        
        let dist = Math.hypot((sponge.x+25) - v.x, (sponge.y+17) - v.y);
        if(dist < 32 && shockTimer <= 0) takeDamage();
    });

    if(shockTimer > 0) {
        shockTimer--;
        if(shockTimer === 0) canvas.classList.remove("shock");
    }

    dust = dust.filter(d => Math.hypot((sponge.x+25)-d.x, (sponge.y+17)-d.y) > 38);
    let progress = Math.floor(((totalDustInLevel - dust.length) / totalDustInLevel) * 100);
    document.getElementById("pct").innerText = progress + "%";

    // Esponja
    ctx.fillStyle = (shockTimer > 0 && shockTimer % 2 === 0) ? "white" : "#ffd700";
    ctx.beginPath(); ctx.roundRect(sponge.x, sponge.y, 50, 35, 8); ctx.fill();

    if(dust.length === 0) {
        if(level === 3) {
            endGame("LIMPIEZA 100%", "cyan");
        } else {
            gameRunning = false;
            let currentLevel = level;
            let discount = currentLevel === 1 ? "10%" : "20%";
            
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 250, 400, 100);
            ctx.fillStyle = "yellow";
            ctx.font = "12px 'Press Start 2P'";
            ctx.textAlign = "center";
            ctx.fillText(¡LVL ${currentLevel} OK! GANASTE ${discount}, 200, 310);
            
            setTimeout(() => {
                level++;
                document.getElementById("lvl").innerText = level;
                createLevel();
                gameRunning = true;
                update();
            }, 2000);
        }
    }
    if(gameRunning) requestAnimationFrame(update);
}
</script>
</body>
</html>
